<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gumption Spellbook</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
:root{--bg:#0f1020;--bg2:#181a2f;--accent:#7c5cff;--text:#f4f1ff;--muted:#b9b4d9;--border:rgba(255,255,255,0.08);}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui;background:radial-gradient(circle at top,#1d1f3f,#070811);color:var(--text)}
.container{max-width:1200px;margin:auto;padding:24px}
h1{text-align:center;margin-bottom:20px}

.tabs{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:20px}
.tab{padding:10px 16px;border-radius:999px;background:#1c1f3a;border:1px solid var(--border);cursor:pointer;color:var(--text)}
.tab.active{background:linear-gradient(135deg,#7c5cff,#5b7cff);color:white;border:none}

.panel{background:var(--bg2);padding:20px;border-radius:16px}

.add-row{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:10px}
input,select,textarea{padding:10px;border-radius:10px;border:1px solid var(--border);background:#121427;color:white}

button{padding:10px;border:none;border-radius:10px;cursor:pointer}
.primary-btn{background:var(--accent);color:white}

.filter-bar{display:flex;justify-content:space-between;margin-bottom:12px}
.filter-btn{padding:6px 10px;border-radius:999px;background:#121427;border:1px solid var(--border);color:var(--muted)}
.filter-btn.active{background:var(--accent);color:white}

table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.05);text-align:center}
th:first-child,td:first-child{text-align:left}
th{cursor:pointer;color:#dcd6ff}

.spell-link{cursor:pointer;color:#d8ccff}

.modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-content{background:#202442;padding:20px;border-radius:16px;max-width:600px;width:100%}

.panel-footer{display:flex;justify-content:space-between;margin-top:16px}
</style>
</head>

<body>
<div class="container">
<h1>📖 Gumption Spellbook</h1>

<div id="tabs" class="tabs"></div>

<div class="panel">

<div class="add-row">
<input id="spellInput" placeholder="Enter spell">
<button id="addSpellBtn" class="primary-btn">Add</button>
</div>

<div id="errorMsg"></div>

<div class="filter-bar">
<div id="castFilters"></div>
<div id="rpFilters"></div>
</div>

<table>
<thead><tr id="tableHead"></tr></thead>
<tbody id="spellTableBody"></tbody>
</table>

<div class="panel-footer">
<button id="customBtn" class="primary-btn">+ Custom Spell</button>
<label class="primary-btn">
Import CSV
<input id="csvFile" type="file" accept=".csv" hidden>
</label>
</div>

</div>
</div>

<!-- CUSTOM MODAL -->
<div id="customModal" class="modal">
<div class="modal-content">
<h2>Custom Spell</h2>

<input id="cName" placeholder="Name">
<select id="cCast"><option>A</option><option>BA</option><option>R</option></select>
<input id="cRange" placeholder="Range">
<input id="cDuration" placeholder="Duration">
<select id="cLevel"><option>C</option><option>1</option><option>2</option><option>3</option></select>

<label><input type="checkbox" id="cRP"> RP</label>
<textarea id="cDesc" placeholder="Description"></textarea>

<button id="saveCustom" class="primary-btn">Save</button>
<button id="closeCustom">Cancel</button>
</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyD6BdFsQ0x93JuJjCeeaZjB5ASpuTw-ALw",
authDomain:"gumption-spellbook.firebaseapp.com",
projectId:"gumption-spellbook",
storageBucket:"gumption-spellbook.firebasestorage.app",
messagingSenderId:"380487584445",
appId:"1:380487584445:web:92e4aa63c5ab89c8a705d4"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const CHARACTERS=['Candy Calderón','Cooper Howard','Deekin Rush','Kuz Rakata','Percy Fireside'];

let activeCharacter=CHARACTERS[0];
let showRPView=false;
let filters={cast:'All',rp:'All RP'};
let spellbook={};
let csvIndex={};
let isLoaded=false;

function initStructure(){
const d={};
CHARACTERS.forEach(c=>d[c]=[]);
return d;
}

db.collection('spellbook').doc('shared').onSnapshot(doc=>{
spellbook=doc.exists?doc.data():initStructure();
isLoaded=true;
render();
});

function save(){
if(!isLoaded)return;
db.collection('spellbook').doc('shared').set(spellbook,{merge:true});
}

function slug(s){return s.trim().toLowerCase().replace(/\s+/g,'-')}
function cast(c){c=c.toLowerCase();if(c.includes('bonus'))return'BA';if(c.includes('reaction'))return'R';return'A'}
function lvl(l){return l==0?'C':l}

function tabs(){
const t=document.getElementById('tabs');
t.innerHTML='';
CHARACTERS.forEach(c=>{
const b=document.createElement('button');
b.className='tab '+(c===activeCharacter?'active':'');
b.textContent=c;
b.onclick=()=>{activeCharacter=c;tabs();render()};
t.appendChild(b);
});
}

function getSpells(){
return spellbook[activeCharacter]||[];
}

function render(){
const b=document.getElementById('spellTableBody');
b.innerHTML='';
getSpells().forEach(sp=>{
const tr=document.createElement('tr');
tr.innerHTML=`
<td>${sp.name}</td>
<td>${sp.cast}</td>
<td>${sp.range}</td>
<td>${sp.duration}</td>
<td>${sp.level}</td>
<td>${sp.rp?'✓':''}</td>
`;
b.appendChild(tr);
});
}

//////////////////////////////// ADD SPELL
async function add(){
const input=document.getElementById('spellInput');
const name=input.value.trim();
if(!name)return;

const s=slug(name);

try{
const r=await fetch(`https://www.dnd5eapi.co/api/spells/${s}`);
if(!r.ok)throw '';

const d=await r.json();

spellbook[activeCharacter].push({
id:crypto.randomUUID(),
name:d.name,
cast:cast(d.casting_time),
range:d.range,
duration:d.duration,
level:lvl(d.level),
rp:false,
desc:(d.desc||[]).join('\n')
});

save();
input.value='';
return;

}catch{
const c=csvIndex[s];
if(c){
spellbook[activeCharacter].push({
id:crypto.randomUUID(),
name:c.Name,
cast:cast(c['Casting Time']||'1 action'),
range:c.Range,
duration:c.Duration,
level:lvl(c.Level||0),
rp:false,
desc:c.Details||''
});
save();
input.value='';
return;
}

document.getElementById('errorMsg').textContent='Spell not found';
}
}

addSpellBtn.onclick=add;
spellInput.onkeydown=e=>{if(e.key==='Enter')add()};

//////////////////////////////// CSV
function parseCSV(text){
const lines=text.split(/\r?\n/);
const headers=lines[0].split(',');

const index={};

for(let i=1;i<lines.length;i++){
const values=lines[i].split(',');
const row={};
headers.forEach((h,j)=>row[h.trim()]=values[j]?.trim());
if(row.Name)index[slug(row.Name)]=row;
}
return index;
}

csvFile.onchange=async e=>{
const file=e.target.files[0];
if(!file)return;
csvIndex=parseCSV(await file.text());
};

//////////////////////////////// CUSTOM
customBtn.onclick=()=>customModal.classList.add('open');
closeCustom.onclick=()=>customModal.classList.remove('open');

saveCustom.onclick=()=>{
const name=cName.value.trim();
if(!name)return;

spellbook[activeCharacter].push({
id:crypto.randomUUID(),
name,
cast:cCast.value,
range:cRange.value,
duration:cDuration.value,
level:cLevel.value,
rp:cRP.checked,
desc:cDesc.value
});

save();
customModal.classList.remove('open');
};

tabs();
</script>
</body>
</html>
