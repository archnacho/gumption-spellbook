<script>
const firebaseConfig = {
apiKey:"AIzaSyD6BdFsQ0x93JuJjCeeaZjB5ASpuTw-ALw",
authDomain:"gumption-spellbook.firebaseapp.com",
projectId:"gumption-spellbook"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const CHARACTERS=['Candy Calderón','Cooper Howard','Deekin Rush','Kuz Rakata','Percy Fireside'];

let activeCharacter=CHARACTERS[0];
let showRPView=false;
let filters={cast:'All',rp:'All RP'};
let spellbook={};
let isLoaded=false;
let csvIndex={}; // 🔥 IMPORTANT

function initStructure(){
const d={};
CHARACTERS.forEach(c=>d[c]=[]);
return d;
}

db.collection('spellbook').doc('shared').onSnapshot(doc=>{
spellbook = doc.exists ? doc.data() : initStructure();
isLoaded=true;
render();
});

function save(){
if(!isLoaded)return;
db.collection('spellbook').doc('shared').set(spellbook,{merge:true});
}

function slug(s){return s.trim().toLowerCase().replace(/\s+/g,'-')}
function cast(c){
c=c.toLowerCase();
if(c.includes('bonus'))return'BA';
if(c.includes('reaction'))return'R';
return'A';
}
function lvl(l){return l==0?'C':l}
function url(n){return`https://www.dndbeyond.com/spells/${slug(n)}`}

/////////////////////////////////////
// ✅ CUSTOM SPELL BUTTON FIX
/////////////////////////////////////

document.getElementById('customBtn').onclick=()=>{
document.getElementById('customModal').classList.add('open');
};

document.getElementById('closeCustom').onclick=()=>{
document.getElementById('customModal').classList.remove('open');
};

document.getElementById('saveCustom').onclick=()=>{
const spell={
id:crypto.randomUUID(),
name:document.getElementById('cName').value,
cast:document.getElementById('cCast').value,
range:document.getElementById('cRange').value,
duration:document.getElementById('cDuration').value,
level:document.getElementById('cLevel').value,
rp:document.getElementById('cRP').checked,
desc:document.getElementById('cDesc')?.value || "Custom spell"
};

if(!spell.name)return;

spellbook[activeCharacter].push(spell);
save();

document.getElementById('customModal').classList.remove('open');
};

/////////////////////////////////////
// ✅ CSV IMPORT FIX
/////////////////////////////////////

function parseCSV(text){
const lines=text.split(/\r?\n/);
const headers=lines[0].split(',');

const index={};

for(let i=1;i<lines.length;i++){
const values=lines[i].split(',');
if(!values.length)continue;

const row={};
headers.forEach((h,j)=>row[h.trim()]=values[j]?.trim());

if(row.Name){
index[slug(row.Name)]=row;
}
}
return index;
}

document.getElementById('csvFile').onchange=async (e)=>{
const file=e.target.files[0];
if(!file)return;

const text=await file.text();
csvIndex=parseCSV(text);

console.log("CSV Loaded:", csvIndex); // debug
};

/////////////////////////////////////
// ✅ ADD SPELL (API + CSV fallback)
/////////////////////////////////////

async function add(){
const input=document.getElementById('spellInput');
const name=input.value.trim();
if(!name)return;

const s=slug(name);

try{
const r=await fetch(`https://www.dnd5eapi.co/api/spells/${s}`);
if(!r.ok)throw 'api fail';

const d=await r.json();

spellbook[activeCharacter].push({
id:crypto.randomUUID(),
name:d.name,
url:url(d.name),
cast:cast(d.casting_time),
range:d.range,
duration:d.duration,
level:lvl(d.level),
rp:false,
desc:(d.desc||[]).join('\\n')
});

save();
input.value='';
return;

}catch(e){

// 🔥 CSV FALLBACK
const c=csvIndex[s];

if(c){
spellbook[activeCharacter].push({
id:crypto.randomUUID(),
name:c.Name,
url:url(c.Name),
cast:cast(c['Casting Time']||'1 action'),
range:c.Range||'',
duration:c.Duration||'',
level:lvl(c.Level||0),
rp:false,
desc:c.Details||''
});

save();
input.value='';
return;
}

// ❌ STILL NOT FOUND
document.getElementById('errorMsg').textContent='Spell not found';
setTimeout(()=>document.getElementById('errorMsg').textContent='',2000);

}
}

document.getElementById('addSpellBtn').onclick=add;
document.getElementById('spellInput').onkeydown=e=>{if(e.key==='Enter')add()};

/////////////////////////////////////
// (rest of your render + tabs stays SAME)
/////////////////////////////////////

</script>
