<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gumption Spellbook</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
:root{--bg:#0f1020;--bg2:#181a2f;--card:#202442;--accent:#7c5cff;--text:#f4f1ff;--muted:#b9b4d9;--danger:#ff5d73;--border:rgba(255,255,255,0.08);}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui;background:radial-gradient(circle at top,#1d1f3f,#070811);color:var(--text)}
.container{max-width:1200px;margin:auto;padding:24px}
h1{text-align:center;margin-bottom:20px}

.tabs{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:20px}
.tab{padding:10px 16px;border-radius:999px;background:#181a2f;border:1px solid var(--border);cursor:pointer}
.tab.active{background:linear-gradient(135deg,#7c5cff,#5b7cff)}

.panel{background:var(--bg2);padding:20px;border-radius:16px}
.add-row{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:10px}

input{padding:12px;border-radius:10px;border:1px solid var(--border);background:#121427;color:white}
button{padding:12px;border:none;border-radius:10px;cursor:pointer}
.primary-btn{background:var(--accent);color:white}

.error-msg{color:#ff9cac;height:20px}

.filter-bar{display:flex;justify-content:space-between;margin-bottom:10px}
.filter-btn{padding:6px 10px;border-radius:999px;background:#121427;color:var(--muted);border:1px solid var(--border)}
.filter-btn.active{background:var(--accent);color:white}

table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.05);text-align:center}
th:first-child, td:first-child{text-align:left}
th:nth-child(2), td:nth-child(2){text-align:left}
th{cursor:pointer}

.spell-link{cursor:pointer;color:#d8ccff}

.modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-content{background:#202442;padding:20px;border-radius:16px;max-width:700px;width:100%}
</style>
</head>

<body>
<div class="container">
<h1>📖 Gumption Spellbook</h1>
<div class="tabs" id="tabs"></div>

<div class="panel">

<div class="add-row">
<input id="spellInput" placeholder="Enter spell">
<button id="addSpellBtn" class="primary-btn">Add</button>
</div>

<div id="errorMsg" class="error-msg"></div>

<div class="filter-bar">
<div id="castFilters"></div>
<div id="rpFilters"></div>
</div>

<table>
<thead><tr></tr></thead>
<tbody id="spellTableBody"></tbody>
</table>

</div>
</div>

<div class="modal" id="spellModal">
<div class="modal-content">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
<h2 id="modalTitle"></h2>
<button id="deleteFromModal">🗑️</button>
</div>
<div id="modalStats"></div>
<div id="modalDesc"></div>
</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD6BdFsQ0x93JuJjCeeaZjB5ASpuTw-ALw",
  authDomain: "gumption-spellbook.firebaseapp.com",
  projectId: "gumption-spellbook",
  storageBucket: "gumption-spellbook.firebasestorage.app",
  messagingSenderId: "380487584445",
  appId: "1:380487584445:web:92e4aa63c5ab89c8a705d4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const CHARACTERS=['Candy Calderón','Cooper Howard','Deekin Rush','Kuz Rakata','Percy Fireside'];

let activeCharacter=CHARACTERS[0];
let showRPView=false;
let filters={cast:'All',rp:'All RP'};
let spellbook=initStructure();
let isLoaded=false;

function initStructure(){
  const d={};
  CHARACTERS.forEach(c=>d[c]=[]);
  return d;
}

// ✅ SAFE REALTIME SYNC
db.collection('spellbook').doc('shared')
.onSnapshot(doc=>{
  if(doc.exists){
    spellbook = doc.data();
  } else {
    spellbook = initStructure();
  }
  isLoaded = true;
  render();
});

function save(){
  if(!isLoaded) return;
  db.collection('spellbook').doc('shared').set(spellbook, { merge:true });
}

function slug(s){return s.trim().toLowerCase().replace(/\s+/g,'-')}
function cast(c){c=c.toLowerCase();if(c.includes('bonus'))return'BA';if(c.includes('reaction'))return'R';return'A'}
function lvl(l){return l==0?'C':l}
function url(n){return`https://www.dndbeyond.com/spells/${slug(n)}`}

function tabs(){
const t=document.getElementById('tabs');
t.innerHTML='';
CHARACTERS.forEach(c=>{
  const b=document.createElement('button');
  b.className='tab '+(c===activeCharacter?'active':'');
  b.textContent=c;
  b.onclick=()=>{activeCharacter=c;tabs();render()};
  t.appendChild(b);
});
}

function getSpells(){
return spellbook[activeCharacter]||[];
}

function render(){
const b=document.getElementById('spellTableBody');
b.innerHTML='';
getSpells().forEach(sp=>{
const tr=document.createElement('tr');
tr.innerHTML=`
<td><span class="spell-link">${sp.name}</span></td>
<td>${sp.cast}</td>
<td>${sp.range}</td>
<td>${sp.duration}</td>
<td>${sp.level}</td>
<td><input type="checkbox" ${sp.rp?'checked':''}></td>
`;
tr.querySelector('.spell-link').onclick=()=>open(sp);
tr.querySelector('input').onchange=e=>{sp.rp=e.target.checked;save();};
b.appendChild(tr);
});
}

function open(sp){
window.currentModalSpell=sp;
document.getElementById('modalTitle').textContent=sp.name;
document.getElementById('modalDesc').textContent=sp.desc;
document.getElementById('modalStats').innerHTML=`
<div>Cast: ${sp.cast}</div>
<div>Range: ${sp.range}</div>
<div>Duration: ${sp.duration}</div>
<div>Level: ${sp.level}</div>
`;
document.getElementById('spellModal').classList.add('open');
}

document.getElementById('spellModal').onclick=e=>{
if(e.target.id==='spellModal'){
document.getElementById('spellModal').classList.remove('open');
}
};

document.getElementById('deleteFromModal').onclick=()=>{
const sp=window.currentModalSpell;
spellbook[activeCharacter]=spellbook[activeCharacter].filter(x=>x.id!==sp.id);
save();
document.getElementById('spellModal').classList.remove('open');
};

async function add(){
const input=document.getElementById('spellInput');
const n=input.value.trim();
if(!n)return;
const s=slug(n);
try{
const r=await fetch(`https://www.dnd5eapi.co/api/spells/${s}`);
if(!r.ok)throw'';
const d=await r.json();
spellbook[activeCharacter].push({
id:crypto.randomUUID(),
name:d.name,
cast:cast(d.casting_time),
range:d.range,
duration:d.duration,
level:lvl(d.level),
rp:false,
desc:(d.desc||[]).join('\\n')
});
save();
input.value='';
}catch{
document.getElementById('errorMsg').textContent='Spell not found';
setTimeout(()=>document.getElementById('errorMsg').textContent='',2000);
}
}

document.getElementById('addSpellBtn').onclick=add;
document.getElementById('spellInput').onkeydown=e=>{if(e.key==='Enter')add()};

tabs();
</script>
</body>
</html>
